name: Reusable Node Pipeline

on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string
      app-path:
        required: true
        type: string

jobs:
  node-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm install
        working-directory: ${{ inputs.app-path }}

      - name: Run tests
        run: npm test
        working-directory: ${{ inputs.app-path }}
